<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - SAFARIs TOURs</title>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>Gallery</h1>
    <p>Discover beautiful safari moments</p>
</div>

<!-- NAVBAR -->
<div class="navbar">
    <a href="index.html" class="nav-btn">HOME</a>
    <a href="about.html" class="nav-btn">ABOUT</a>
    <a href="services.html" class="nav-btn">SERVICES</a>
    <a href="gallery.html" class="nav-btn">GALLERY</a>
    <a href="packages.html" class="nav-btn">PACKAGES</a>
    <a href="Faq.html" class="nav-btn">FAQ</a>
    <a href="contact.html" class="nav-btn">CONTACT</a>
</div>

<!-- GALLERY -->
<div class="gallery">

    <!-- IMAGE 1 -->
    <div class="gallery-item">
        <img src="adventure.jpg">
        <div class="overlay">Safari Adventure</div>
    </div>

    <!-- IMAGE 2 -->
    <div class="gallery-item">
        <img src="safari.jpg">
        <div class="overlay">Wildlife Experience</div>
    </div>

    <!-- IMAGE 3 -->
    <div class="gallery-item">
        <img src="nature.jpg">
        <div class="overlay">Nature & Travel</div>
    </div>

    <!-- IMAGE 4 -->
    <div class="gallery-item">
        <img src="luxury.jpg">
        <div class="overlay">Luxury Safari</div>
    </div>

    <!-- IMAGE 5 -->
    <div class="gallery-item">
        <img src="sn.jpg">
        <div class="overlay">African Sunset</div>
    </div>

    <!-- IMAGE 6 -->
    <div class="gallery-item">
        <img src="tanzania.jpg">
        <div class="overlay">Explore Tanzania</div>
    </div>

</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 SAFARIs TOURs | Designed by Arthur</p>
</footer>



<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

/* HEADER */
.header{
    height:300px;
    background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url("safari.jpg");
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    text-align:center;
}

.header h1{
    font-size:60px;
    margin:0;
}

.header p{
    font-size:22px;
}

/* NAVBAR */
.navbar{
    background:#3b2f2f;
    display:flex;
    justify-content:center;
    gap:20px;
    padding:15px;
    flex-wrap:wrap;
}

.nav-btn{
    color:white;
    text-decoration:none;
    padding:10px 20px;
    border-radius:20px;
    transition:0.3s;
}

.nav-btn:hover{
    background:#ff8c00;
}

/* GALLERY */
.gallery{
    max-width:1200px;
    margin:auto;
    padding:50px 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(280px,1fr));
    gap:25px;
}

/* IMAGE CARD */
.gallery-item{
    overflow:hidden;
    border-radius:20px;
    position:relative;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.gallery-item img{
    width:100%;
    height:300px;
    object-fit:cover;
    transition:0.5s;
}

/* HOVER EFFECT */
.gallery-item:hover img{
    transform:scale(1.1);
}

/* IMAGE TEXT */
.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.5);
    color:white;
    text-align:center;
    padding:15px;
    font-size:20px;
}

/* FOOTER */
footer{
    background:#3b2f2f;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}

</style>

</body>
</html>
